<!DOCTYPE html>
<html>
<head>
    <title>Khang AI Studio - Pro</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        input { padding: 10px; width: 300px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #38bdf8; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #status { margin: 20px; color: #818cf8; }
        video { margin-top: 20px; width: 80%; max-width: 600px; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <h1>🚀 KHANG AI STUDIO PRO</h1>
    <p>Tạo video không lo lỗi Gradio</p>
    
    <input type="text" id="promptInput" placeholder="Nhập ý tưởng (Tiếng Anh)...">
    <button onclick="generateVideo()">Tạo Video</button>
    
    <div id="status"></div>
    <video id="resultVideo" controls></video>

    <script>
        async function generateVideo() {
            const prompt = document.getElementById('promptInput').value;
            const status = document.getElementById('status');
            const video = document.getElementById('resultVideo');
            
            if (!prompt) return alert("Hãy nhập gì đó nhé!");

            status.innerText = "⏳ AI đang suy nghĩ... (Có thể mất 1-2 phút)";
            video.style.display = "none";

            try {
                const response = await fetch(
                    # Thay dòng cũ bằng dòng này
client = InferenceClient("ali-vilab/text-to-video-ms-1.5b"),
                    {
                        headers: { Authorization: "Bearer hf_xxxx" }, // Bạn cần điền Token của bạn vào đây
                        method: "POST",
                        body: JSON.stringify({ inputs: prompt }),
                    }
                );

                const blob = await response.blob();
                const videoUrl = URL.createObjectURL(blob);
                
                video.src = videoUrl;
                video.style.display = "block";
                status.innerText = "✅ Đã xong!";
            } catch (error) {
                status.innerText = "❌ Lỗi rồi, hãy thử lại nhé!";
                console.error(error);
            }
        }
    </script>
</body>
</html>
