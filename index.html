<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khang AI Studio Pro</title>
    <style>
        :root { --main: #00f2fe; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .studio-card { background: #111; padding: 40px; border-radius: 25px; border: 1px solid #222; width: 100%; max-width: 550px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        h1 { text-align: center; background: linear-gradient(to right, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(to right, #4facfe, #00f2fe); color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0,242,254,0.4); }
        button:disabled { background: #333; cursor: not-allowed; opacity: 0.5; }
        #status { margin-top: 20px; text-align: center; color: #888; font-size: 14px; min-height: 40px; }
        video { width: 100%; margin-top: 25px; border-radius: 15px; display: none; border: 1px solid #333; }
        .spinner { display: none; margin: 10px auto; width: 25px; height: 25px; border: 3px solid #333; border-top-color: var(--main); border-radius: 50%; animation: rot 1s linear infinite; }
        @keyframes rot { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="studio-card">
        <h1>KHANG AI STUDIO</h1>
        <textarea id="promptInput" rows="3" placeholder="Nhập ý tưởng (VD: Con mèo bay lượn trong không trung...)"></textarea>
        <button id="genBtn" onclick="startProcess()">🚀 TẠO VIDEO NGAY</button>
        
        <div class="spinner" id="loader"></div>
        <div id="status">Hệ thống đã sẵn sàng.</div>
        
        <video id="outputVideo" controls autoplay loop></video>
    </div>

    <script>
        // --- PHẦN CHIA TÁCH TOKEN ĐỂ BẢO MẬT ---
        const a = "hf_";
        const b = "XUvjvLEGdQrM";
        const c = "GnTEzxBRPdjw";
        const d = "gfvEvAqtyh";
        
        const KEY = a + b + c + d;
        const MODEL = "https://api-inference.huggingface.co/models/ali-vilab/text-to-video-ms-1.5b";

        async function startProcess() {
            const input = document.getElementById('promptInput').value.trim();
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const video = document.getElementById('outputVideo');
            const loader = document.getElementById('loader');

            if (!input) return alert("Bạn quên nhập ý tưởng rồi kìa!");

            btn.disabled = true;
            loader.style.display = "block";
            video.style.display = "none";
            status.innerHTML = "⏳ Đang dịch ý tưởng của bạn...";

            try {
                // Tự động dịch sang tiếng Anh để AI hiểu chuẩn nhất
                const resTrans = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(input)}`);
                const jsonTrans = await resTrans.json();
                const englishText = jsonTrans[0][0][0];
                
                status.innerHTML = `🎬 Đang xử lý: <i>"${englishText}"</i><br>(Mất khoảng 30-60 giây)`;

                const response = await fetch(MODEL, {
                    headers: { "Authorization": `Bearer ${KEY}` },
                    method: "POST",
                    body: JSON.stringify({ inputs: englishText }),
                });

                if (!response.ok) {
                    if (response.status === 503) throw new Error("Máy chủ AI đang khởi động, hãy đợi 30s rồi nhấn lại nhé!");
                    throw new Error("Có lỗi từ máy chủ Hugging Face.");
                }

                const blob = await response.blob();
                video.src = URL.createObjectURL(blob);
                video.style.display = "block";
                status.innerHTML = "✨ <b>Thành công!</b> Video của bạn đây.";
            } catch (err) {
                status.innerHTML = `<span style="color:#ff4d4d">❌ ${err.message}</span>`;
            } finally {
                btn.disabled = false;
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
