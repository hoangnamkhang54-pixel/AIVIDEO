<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khang AI Studio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* Màu nền tối sang trọng */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .studio-container {
            width: 95%;
            max-width: 1100px;
            background: #1e293b;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 50px;
        }
        iframe {
            width: 100%;
            height: 800px; /* Tăng chiều cao để không bị cuộn bên trong */
            border: none;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>✨ KHANG AI STUDIO ✨</h1>
        <p>Sáng tạo Video bằng trí tuệ nhân tạo</p>
    </div>

    <div class="studio-container">
        <iframe
            src="https://huggingface.co/spaces/sbiki/khang-ai-studio/embed"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
        ></iframe>
    </div>

</body>
</html>
